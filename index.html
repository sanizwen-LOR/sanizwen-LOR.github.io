<style>
body{
margin:0;
font-family:Arial;
}

/* Header */
header{
text-align:center;
background:#fff;
padding:15px;
}

.logo{
height:80px;
vertical-align:middle;
}

nav{
margin-top:10px;
}

nav a{
margin:0 12px;
text-decoration:none;
color:#333;
font-weight:bold;
}

nav a:hover{
color:#007bff;
}

/* Banner */
.hero{
background:url('images/banner.jpg') center/cover no-repeat;
height:400px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
text-align:center;
}

.hero h1{
font-size:40px;
margin:0;
}

.hero p{
font-size:18px;
margin:10px 0;
}

/* 按钮 */
.btn{
background:#007bff;
color:#fff;
padding:12px 20px;
border-radius:6px;
text-decoration:none;
font-weight:bold;
}

.btn:hover{
background:#0056b3;
}

/* 服务 */
.services{
display:flex;
gap:20px;
padding:30px;
flex-wrap:wrap;
justify-content:center;
}

.card{
width:300px;
background:#f4f4f4;
border-radius:8px;
overflow:hidden;
text-align:center;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card h3{
margin:10px 0;
}

/* 电话浮动 */
.float-call{
position:fixed;
bottom:20px;
right:20px;
background:#007bff;
color:#fff;
padding:15px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
}

/* 手机适配 */
@media(max-width:768px){
.hero{
height:300px;
}
.hero h1{
font-size:26px;
}
nav a{
display:block;
margin:5px 0;
}
}
</style>
